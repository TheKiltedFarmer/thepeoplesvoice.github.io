const aligned=b.filter(b=>{ const cw=b.votes_yes>b.votes_no?“yes”:“no”; return rep.votes[b.id].vote===cw; }).length;
return Math.round((aligned/b.length)*100);
};

)}

);

useEffect(()=>{ if(open&&tab===“forum”) loadComments(); },[open,tab]);

const loadComments=async()=>{
const {data}=await sb.from(“bill_comments”).select(”*”).eq(“bill_id”,bill.id).order(“created_at”,{ascending:false});
if(data) setComments(data);

// ─── Project Card ─────────────────────────────────────────────────────────────
function ProjectCard({project, user, onRepGain}) {
const [open,setOpen]=useState(false);
const [tab,setTab]=useState(“pledges”);
const [pledgeType,setPledgeType]=useState(“labor”);
const [pledgeVal,setPledgeVal]=useState(””);
const [pledgeDetail,setPledgeDetail]=useState(””);
const [commentText,setCommentText]=useState(””);
const [pledges,setPledges]=useState([]);
const [comments,setComments]=useState([]);
const [supported,setSupported]=useState(false);
const [supportCount,setSupportCount]=useState(project.supporter_count||0);
const [letter,setLetter]=useState(project.forwarded_letter||null);
const [showLetter,setShowLetter]=useState(false);
const [toast,setToast]=useState(null);
const catColor=CAT_COLORS[project.category]||”#555”;
const isReady=supportCount>=project.supporter_threshold;
const supportPct=Math.min(100,Math.round((supportCount/project.supporter_threshold)*100));

useEffect(()=>{ if(open){ loadPledges(); loadComments(); checkSupport(); } },[open]);

const loadPledges=async()=>{ const {data}=await sb.from(“project_pledges”).select(”*”).eq(“project_id”,project.id); if(data) setPledges(data); };
const loadComments=async()=>{ const {data}=await sb.from(“project_comments”).select(”*”).eq(“project_id”,project.id).order(“created_at”,{ascending:false}); if(data) setComments(data); };
const checkSupport=async()=>{ if(!user) return; const {data}=await sb.from(“project_supporters”).select(“id”).eq(“project_id”,project.id).eq(“user_id”,user.id); if(data&&data.length) setSupported(true); };

const addSupport=async()=>{
if(!user){setToast(“Sign in to support projects.”);return;}
if(supported) return;
const {error}=await sb.from(“project_supporters”).insert({project_id:project.id,user_id:user.id});
if(!error){
await sb.from(“projects”).update({supporter_count:supportCount+1}).eq(“id”,project.id);
setSupportCount(c=>c+1); setSupported(true);
await sb.from(“profiles”).update({reputation:((user.reputation||0)+5)}).eq(“id”,user.id);
onRepGain(5); setToast(“Support added! +5 reputation”);
}
};

const submitPledge=async()=>{
if(!pledgeVal.trim()||!user) return;
const name=user.display_name||user.email.split(”@”)[0];
const {error}=await sb.from(“project_pledges”).insert({project_id:project.id,user_id:user.id,display_name:name,pledge_type:pledgeType,value:pledgeVal,detail:pledgeDetail});
if(!error){
setPledges(prev=>[…prev,{display_name:name,pledge_type:pledgeType,value:pledgeVal,detail:pledgeDetail}]);
setPledgeVal(””); setPledgeDetail(””);
await sb.from(“profiles”).update({reputation:((user.reputation||0)+15)}).eq(“id”,user.id);
onRepGain(15); setToast(“Pledge saved! +15 reputation”);
}
};

const postComment=async()=>{
if(!commentText.trim()||!user) return;
const name=user.display_name||user.email.split(”@”)[0];
const {error}=await sb.from(“project_comments”).insert({project_id:project.id,user_id:user.id,display_name:name,content:commentText.trim()});
if(!error){
setComments(prev=>[{display_name:name,content:commentText.trim(),created_at:new Date().toISOString()},…prev]);
setCommentText(””);
await sb.from(“profiles”).update({reputation:((user.reputation||0)+10)}).eq(“id”,user.id);
onRepGain(10); setToast(”+10 reputation!”);
}
};

const generateLetter=async()=>{
const pledgeSummary=pledges.map(p=>`${p.display_name}: ${p.pledge_type} - ${p.value}`).join(”, “);
const text=`Dear ${project.official_target_name},\n\nWe, ${supportCount} verified residents of ${project.jurisdiction}, write to formally request your support for the following community initiative:\n\n"${project.title}"\n\n${project.description}\n\nOur community has already pledged the following resources toward this project: ${pledgeSummary||"volunteer time and community support"}.\n\nThis proposal reflects the genuine priorities of your constituents as documented through The People's Voice civic platform. We respectfully request a response or a meeting to discuss how this project can receive official support.\n\nRespectfully,\nThe People of ${project.jurisdiction}\nvia The People's Voice Civic Platform\nthekiltedfarmer.github.io`;
await sb.from(“projects”).update({forwarded_letter:text,status:“forwarded”}).eq(“id”,project.id);
setLetter(text); setShowLetter(true); setToast(“Letter generated & project marked as forwarded!”);
};

return (
<div style={{background:”#fff”,borderRadius:10,border:“1px solid #e5dece”,marginBottom:16,overflow:“hidden”,boxShadow:“0 2px 10px rgba(0,0,0,0.05)”}}>
{toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
<div style={{borderLeft:`5px solid ${catColor}`,padding:“18px 20px”}}>
<div style={{display:“flex”,gap:7,flexWrap:“wrap”,marginBottom:10}}>
<span style={{background:catColor+“22”,color:catColor,fontSize:11,fontWeight:700,padding:“3px 9px”,borderRadius:20}}>🌱 {project.category}</span>
<span style={{background:”#f5f5f5”,color:”#555”,fontSize:11,padding:“3px 9px”,borderRadius:20}}>{project.jurisdiction}</span>
<span style={{background:project.status===“forwarded”?”#eef7f1”:”#fffbea”,color:project.status===“forwarded”?”#1a6b3c”:”#8a6000”,fontSize:11,fontWeight:700,padding:“3px 9px”,borderRadius:20}}>
{project.status===“forwarded”?“✅ Forwarded to Officials”:“⏳ Gathering Support”}
</span>
</div>
<h3 style={{fontFamily:”‘Playfair Display’,serif”,fontWeight:900,fontSize:18,color:”#1a1a2e”,margin:“0 0 6px”,lineHeight:1.3}}>{project.title}</h3>
<div style={{fontSize:12,color:”#aaa”,marginBottom:10}}>Proposed by <strong style={{color:”#5b3a8c”}}>{project.proposer_name}</strong> · {new Date(project.created_at).toLocaleDateString()}</div>
<p style={{fontFamily:”‘Lora’,serif”,fontSize:14,lineHeight:1.75,color:”#444”,margin:“0 0 16px”}}>{project.description}</p>
<div style={{marginBottom:14}}>
<div style={{display:“flex”,justifyContent:“space-between”,marginBottom:6}}>
<span style={{fontSize:13,fontFamily:”‘Playfair Display’,serif”,fontWeight:700,color:”#1a1a2e”}}>Community Support</span>
<span style={{fontSize:13,color:isReady?”#1a6b3c”:”#888”,fontWeight:isReady?700:400}}>{supportCount} / {project.supporter_threshold} {isReady?“✅”:””}</span>
</div>
<div style={{height:12,background:”#eee”,borderRadius:6,overflow:“hidden”}}>
<div style={{width:`${supportPct}%`,height:“100%”,background:isReady?”#1a6b3c”:catColor,transition:“width 0.5s”}}/>
</div>
</div>
<div style={{display:“flex”,gap:8,flexWrap:“wrap”,alignItems:“center”}}>
{!supported?(
<button onClick={addSupport} style={{background:”#1a6b3c”,color:”#fff”,border:“none”,padding:“9px 18px”,borderRadius:5,fontFamily:”‘Playfair Display’,serif”,fontWeight:700,fontSize:13}}>🤝 Add My Support</button>
):(
<div style={{background:”#eef7f1”,border:“1px solid #c8e8d4”,borderRadius:5,padding:“8px 14px”,fontSize:13,color:”#1a6b3c”}}>✓ You support this</div>
)}
{isReady&&project.status!==“forwarded”&&(

          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:18}}>{repInfo.icon}</span>
            <div>
              <div style={{color:"#f0c040",fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15}}>{rep} pts</div>
              <div style={{color:repInfo.color,fontSize:11,fontWeight:600}}>{repInfo.label}</div>
            </div>
          </div>
          {!canPropose&&<div style={{fontSize:10,color:"#8899aa",marginTop:4}}>{REP_TO_PROPOSE-rep} more to propose</div>}
          {canPropose&&<div style={{fontSize:10,color:"#f0c040",marginTop:4}}>✓ Can propose</div>}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{color:"#fff",fontSize:13,fontFamily:"'Playfair Display',serif"}}>{displayName}</div>
          <div style={{color:"#f0c040",fontSize:11}}>✓ Verified · ZIP {profile?.zip}</div>
          <button onClick={handleSignOut} style={{background:"transparent",border:"none",color:"#8899aa",fontSize:11,cursor:"pointer",marginTop:2}}>Sign out</button>
        </div>
      </div>
    </div>

    {/* Stats */}
    <div style={{background:"rgba(255,255,255,0.04)",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"8px 20px",display:"flex",gap:24,flexWrap:"wrap"}}>
        {[["Active Bills",bills.length],["Total Votes",totalVotes.toLocaleString()],["Live Projects",projects.length],["Your Rep",`${rep} pts`]].map(([l,v])=>(
          <div key={l}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:900,color:"#f0c040"}}>{v}</div>
            <div style={{fontSize:10,color:"#8899aa",textTransform:"uppercase",letterSpacing:1}}>{l}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Tabs */}
    <div style={{maxWidth:900,margin:"0 auto",padding:"0 20px",display:"flex"}}>
      {[["bills","🗳 Bills"],["projects","🌱 Projects"],["reps","🏛 Reps"]].map(([t,l])=>(
        <button key={t} onClick={()=>setMainTab(t)} style={{background:"transparent",border:"none",borderBottom:mainTab===t?"3px solid #f0c040":"3px solid transparent",padding:"12px 18px",fontFamily:"'Playfair Display',serif",fontWeight:mainTab===t?700:400,fontSize:14,color:mainTab===t?"#f0c040":"#8899aa"}}>
          {l}
        </button>
      ))}
    </div>
  </div>

  {/* Body */}
  <div style={{maxWidth:900,margin:"0 auto",padding:"16px 20px 50px"}}>

    {/* BILLS */}
    {mainTab==="bills"&&<>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
        <span style={{fontSize:12,color:"#aaa"}}>Filter:</span>
        {[["all","All"],["village","🏘 Concord"],["city","🏙 Jackson"],["township","🌾 Township"],["state","🏛 State"]].map(([v,l])=>(
          <button key={v} onClick={()=>setBillFilter(v)} style={{background:billFilter===v?"#1a1a2e":"#fff",color:billFilter===v?"#f0c040":"#555",border:`1px solid ${billFilter===v?"#1a1a2e":"#ddd"}`,padding:"7px 14px",borderRadius:20,fontFamily:"'Playfair Display',serif",fontSize:12,fontWeight:billFilter===v?700:400}}>{l}</button>
        ))}
        <div style={{marginLeft:"auto",fontSize:12,color:"#aaa"}}>{filteredBills.length} bill{filteredBills.length!==1?"s":""}</div>
      </div>
      {filteredBills.length===0&&<div style={{textAlign:"center",padding:40,color:"#aaa",fontStyle:"italic"}}>Loading bills...</div>}
      {filteredBills.map(bill=>(
        <BillCard key={bill.id} bill={bill} user={{...user,...profile,reputation:rep}} userVotes={userVotes} onVoteCast={handleVoteCast} onRepGain={gainRep}/>
      ))}
    </>}

    {/* PROJECTS */}
    {mainTab==="projects"&&<>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:"#1a1a2e"}}>Community Projects</div>
          <div style={{fontFamily:"'Lora',serif",fontSize:13,color:"#888",marginTop:3}}>Propose. Pledge. Build. Forward to power.</div>
        </div>
        {canPropose?(
          <button onClick={()=>setShowPropose(true)} style={{background:"#1a6b3c",color:"#fff",border:"none",padding:"10px 20px",borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14}}>+ Propose a Project</button>
        ):(
          <div style={{background:"#faf8f3",border:"1px solid #e5dece",borderRadius:7,padding:"10px 16px",fontSize:13,color:"#888",textAlign:"center"}}>
            <div style={{fontWeight:600,color:"#5b3a8c",marginBottom:2}}>{repInfo.icon} {repInfo.label}</div>
            Earn <strong>{REP_TO_PROPOSE-rep} more rep</strong> to propose<br/>
            <span style={{fontSize:11}}>Vote (+5) · Comment (+10) · Pledge (+15)</span>
          </div>
        )}
      </div>
      <div style={{background:"#faf8f3",border:"1px solid #e5dece",borderRadius:8,padding:"10px 16px",marginBottom:16,display:"flex",gap:14,flexWrap:"wrap",alignItems:"center"}}>
        <span style={{fontSize:12,color:"#888",fontStyle:"italic"}}>Earn rep:</span>
        {[["🗳 Vote","+5"],["💬 Comment","+10"],["🤲 Pledge","+15"],["🌱 Propose","50 req"]].map(([l,v])=>(
          <div key={l} style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:12,color:"#555"}}>{l}</span>
            <span style={{background:"#f0c040",color:"#1a1a2e",fontSize:11,fontWeight:700,padding:"2px 7px",borderRadius:20}}>{v}</span>
          </div>
        ))}
      </div>
      {projects.length===0&&<div style={{textAlign:"center",padding:40,color:"#aaa",fontStyle:"italic"}}>No projects yet. Be the first to propose one!</div>}
      {projects.map(proj=>(
        <ProjectCard key={proj.id} project={proj} user={{...user,...profile,reputation:rep}} onRepGain={gainRep}/>
      ))}
    </>}

    {/* REPS */}
    {mainTab==="reps"&&<>
      <div style={{marginBottom:16}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:"#1a1a2e",marginBottom:4}}>Representative Accountability</div>
        <div style={{fontFamily:"'Lora',serif",fontSize:13,color:"#888"}}>How your elected officials voted — compared to how you voted.</div>
      </div>
      <RepTracker bills={bills}/>
    </>}
  </div>

  {/* Footer */}
  <div style={{background:"#1a1a2e",borderTop:"3px solid #f0c040",color:"#556677",textAlign:"center",padding:"24px 20px",fontSize:12,lineHeight:1.9}}>
    <div style={{fontFamily:"'Playfair Display',serif",color:"#f0c040",fontSize:14,marginBottom:8}}>The People's Voice — Jackson County, MI</div>
    <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"10px 16px",maxWidth:600,margin:"0 auto 10px",fontSize:11,color:"#8899aa",lineHeight:1.7}}>
      ⚖️ <strong style={{color:"#aab"}}>Nonpartisan Statement:</strong> Not affiliated with any political party, government body, or elected official. All analysis is factual and balanced. Community votes carry no official weight.
    </div>
    Votes &amp; proposals are unofficial civic engagement<br/>
    <span style={{color:"#5b3a8c"}}>Concord → Jackson → Michigan → Nation</span>
  </div>
</div>

);

const root = ReactDOM.createRoot(document.getElementById(‘root’));
root.render(React.createElement(App));
</script>
